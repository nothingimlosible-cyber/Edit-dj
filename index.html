<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Pro V3 - Rekam Tanpa Iklan</title>
    
    <!-- STYLE LANGSUNG DI SINI BIAR GAMPANG -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0f0f0f;
            color: white;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            padding-bottom: 120px; /* Ruang buat iklan bawah */
            text-align: center;
        }
        
        h1 {
            color: #ff0055;
            margin-bottom: 10px;
        }
        
        /* AREA REKAM */
        #record-area {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            margin: 20px auto;
            max-width: 500px;
            border: 2px solid #ff0055;
        }
        
        /* SEMUA TOMBOL */
        button {
            padding: 18px 35px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            margin: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #recordBtn { 
            background: linear-gradient(45deg, #ff0055, #ff3344);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 0, 85, 0.4);
        }
        
        #stopBtn { 
            background: #333; 
            color: white;
            display: none;
        }
        
        #downloadBtn { 
            background: linear-gradient(45deg, #00ff88, #00cc66);
            color: black;
            display: none;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        
        #statusRekam {
            margin-top: 15px;
            font-size: 16px;
            color: #00ff88;
            min-height: 24px;
        }
        
        /* PAS LAGI REKAM = SEMBUNYIIN IKLAN */
        body.recording #ads-container,
        body.recording .hilltopads,
        body.recording [id*="hilltop"],
        body.recording iframe {
            display: none !important;
        }
        
        /* WADAH IKLAN */
        #ads-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1;
            background: #000;
        }
    </style>
</head>
<body>
    
    <h1>🎧 DJ PRO V3</h1>
    <p>Rekam jedag jedug lu tanpa gangguan iklan</p>
    
    <!-- AREA TOMBOL REKAM - IKLAN AUTO HILANG PAS REKAM -->
    <div id="record-area">
        <button id="recordBtn" onclick="startRecording()">🎙️ MULAI REKAM</button>
        <button id="stopBtn" onclick="stopRecording()">⏹️ STOP REKAM</button>
        <button id="downloadBtn">💾 DOWNLOAD HASIL</button>
        <p id="statusRekam"></p>
    </div>
    
    <!-- TARO EFEK DJ LU DI SINI -->
    <div id="waveform" style="margin-top:20px;"></div>
    
    <!-- WADAH IKLAN - BAKAL HILANG PAS REKAM -->
    <div id="ads-container">
        <!-- PASTE SCRIPT HILLTOPADS LU DI SINI -->
        <!-- Contoh: -->
        <script>
            // Ganti sama kode iklan HilltopAds lu
            // (function(d,z,s){s.src='//'+d+'/401/'+z;try{(document.body||document.documentElement).appendChild(s)}catch(e){}})('skeestorkink.com',9859649,document.createElement('script'))
        </script>
    </div>

    <!-- JAVASCRIPT LANGSUNG DI SINI -->
    <script>
        let mediaRecorder;
        let audioChunks = [];
        
        async function startRecording() {
            // 1. SEMBUNYIIN SEMUA IKLAN
            document.body.classList.add('recording');
            
            // 2. GANTI TAMPILAN TOMBOL
            document.getElementById('recordBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('statusRekam').innerText = '🔴 Sedang Merekam... Ngomong / Play musik';
            
            // 3. MINTA IZIN MIC + MULAI REKAM
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    // BIKIN FILE DARI HASIL REKAMAN
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const url = URL.createObjectURL(blob);
                    
                    // SETTING TOMBOL DOWNLOAD
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.style.display = 'inline-block';
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `DJ_Pro_V3_${Date.now()}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        document.getElementById('statusRekam').innerText = '✅ Berhasil di-download!';
                    };
                    
                    document.getElementById('statusRekam').innerText = '✅ Rekaman selesai. Klik Download!';
                };
                
                mediaRecorder.start();
            } catch (err) {
                alert('Error bang: Kasih izin MIC dulu di browser. ' + err);
                stopRecording(); // Balikin normal kalo ditolak
            }
        }
        
        function stopRecording() {
            // 1. MUNCULIN IKLAN LAGI
            document.body.classList.remove('recording');
            
            // 2. STOP REKAMAN + MATIN MIC
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            
            // 3. BALIKIN TOMBOL KE AWAL
            document.getElementById('recordBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('statusRekam').innerText = 'Memproses rekaman...';
        }
    </script>
    
</body>
</html>
