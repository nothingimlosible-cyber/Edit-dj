<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ PRO V3 GOD MODE - FIXED</title>
    <meta name="theme-color" content="#ff0080">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; padding: 12px; padding-bottom: 80px!important; overflow-x: hidden; }
    .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #ff0080; text-shadow: 0 0 15px #ff0080; margin-bottom: 12px; font-size: 22px; }
    .upload-section { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #ff0080; }
    .file-btn { width: 100%; padding: 12px; background: linear-gradient(45deg, #ff0080, #7928ca); border: none; border-radius: 6px; color: #fff; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        audio { width: 100%; height: 32px; }
    .visualizer { width: 100%; height: 70px; background: #000; border-radius: 6px; margin: 8px 0; border: 1px solid #ff0080; }
    .controls,.fx-pad,.hotcue-pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
        button { padding: 8px 4px; background: linear-gradient(45deg, #ff0080, #7928ca); border: none; border-radius: 6px; color: #fff; font-weight: bold; font-size: 9px; cursor: pointer; transition: all 0.1s; position: relative; touch-action: manipulation; }
        button:active { transform: scale(0.9); }
        button::after { content: '🎁'; position: absolute; top: -2px; right: -2px; font-size: 8px; }
     .fx-btn { background: linear-gradient(45deg, #ff8800, #ff0080)!important; height: 45px; font-size: 8px; }
     .hotcue-btn { background: linear-gradient(45deg, #00ff88, #00cc66)!important; height: 40px; font-size: 10px; color: #000!important; }
     .hotcue-btn.set { background: linear-gradient(45deg, #ffff00, #ff8800)!important; }
     .hotcue-btn::after { content: ''; }
     .pro-btn { background: linear-gradient(45deg, #0088ff, #00ccff)!important; height: 45px; font-size: 8px; }
     .effect-section { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
     .effect-title { color: #ff0080; margin-bottom: 6px; font-size: 13px; font-weight: bold; }
     .slider-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 3px; font-size: 11px; color: #ccc; }
        input[type="range"] { width: 100%; height: 4px; background: #2a2a2a; border-radius: 5px; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #ff0080; border-radius: 50%; cursor: pointer; }
     .eq-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; text-align: center; }
     .eq-slider { height: 80px!important; writing-mode: vertical-lr; direction: rtl; }
     .jedag-mode { background: linear-gradient(45deg, #ff0000, #ff8800)!important; animation: jedag 0.3s infinite; }
        @keyframes jedag { 0%, 100% { box-shadow: 0 0 15px #ff0000; } 50% { box-shadow: 0 0 30px #ff8800; } }
     .active { background: #00ff88!important; color: #000!important; }
        #adStatus { position:fixed; bottom:10px; left:10px; background:#00ff88; color:#000; padding:4px 8px; border-radius:12px; font-size:10px; z-index:999; font-weight:bold; }
        #downloadRecBtn { width: 100%; padding: 12px; background: linear-gradient(45deg, #00ff88, #00cc66); color: #000; font-size: 14px; margin-top: 8px; display: none; }
        #downloadRecBtn::after { content: '⬇️'; }
        #recStatus { text-align: center; font-size: 12px; color: #00ff88; margin-top: 6px; min-height: 16px; }
        body.recording #adStatus, body.recording #vast-player { display: none!important; }
        #bpmDisplay { text-align: center; font-size: 16px; color: #00ff88; font-weight: bold; margin: 8px 0; }
        #recBtn::after { content: ''; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 DJ PRO V3 GOD MODE</h1>
        <div class="upload-section">
            <input type="file" id="audioFile" accept="audio/*" hidden>
            <button class="file-btn" onclick="handleFileClick()">📁 PILIH LAGU MP3</button>
            <audio id="audioPlayer" controls></audio>
            <canvas id="visualizer" class="visualizer"></canvas>
            <div id="bpmDisplay">BPM: --</div>
            <button id="downloadRecBtn">💾 DOWNLOAD HASIL REKAMAN</button>
            <p id="recStatus"></p>
        </div>

        <div class="controls">
            <button id="playBtn">▶️ PLAY</button>
            <button id="pauseBtn">⏸️ PAUSE</button>
            <button id="stopBtn">⏹️ STOP</button>
            <button id="cueBtn">CUE</button>
            <button id="loopBtn">🔄 LOOP</button>
            <button id="recBtn">🔴 REC</button>
            <button id="jedagBtn">💥JEDAG</button>
            <button id="syncBtn">🔗 SYNC</button>
        </div>

        <div class="effect-section">
            <div class="effect-title">🎯 HOT CUE 1-8</div>
            <div class="hotcue-pad">
                <button class="hotcue-btn" data-cue="1">CUE 1</button>
                <button class="hotcue-btn" data-cue="2">CUE 2</button>
                <button class="hotcue-btn" data-cue="3">CUE 3</button>
                <button class="hotcue-btn" data-cue="4">CUE 4</button>
                <button class="hotcue-btn" data-cue="5">CUE 5</button>
                <button class="hotcue-btn" data-cue="6">CUE 6</button>
                <button class="hotcue-btn" data-cue="7">CUE 7</button>
                <button class="hotcue-btn" data-cue="8">CUE 8</button>
            </div>
        </div>

        <div class="effect-section">
            <div class="effect-title">💿 SAMPLER PAD 16</div>
            <div class="fx-pad">
                <button class="fx-btn" data-fx="airhorn">📢 AIRHORN</button>
                <button class="fx-btn" data-fx="siren">🚨 SIREN</button>
                <button class="fx-btn" data-fx="scratch">💿 SCRATCH</button>
                <button class="fx-btn" data-fx="buildup">📈 BUILDUP</button>
                <button class="fx-btn" data-fx="laser">🔫 LASER</button>
                <button class="fx-btn" data-fx="ufo">🛸 UFO</button>
                <button class="fx-btn" data-fx="gunshot">💥 GUNSHOT</button>
                <button class="fx-btn" data-fx="riser">🚀 RISER</button>
                <button class="fx-btn" data-fx="impact">💣 IMPACT</button>
                <button class="fx-btn" data-fx="clap">👏 CLAP</button>
                <button class="fx-btn" data-fx="kick">🥁 KICK</button>
                <button class="fx-btn" data-fx="snare">🥁 SNARE</button>
                <button class="fx-btn" data-fx="hat">🎩 HI-HAT</button>
                <button class="fx-btn" data-fx="vocal1">🎤 YEAH!</button>
                <button class="fx-btn" data-fx="vocal2">🎤 LET'S GO</button>
                <button class="fx-btn" data-fx="vocal3">🎤 BASS!</button>
            </div>
        </div>

        <div class="effect-section">
            <div class="effect-title">🎛️ PRO DJ TOOLS</div>
            <div class="fx-pad">
                <button class="pro-btn" id="pitchUpBtn">🔼 PITCH+</button>
                <button class="pro-btn" id="pitchDownBtn">🔽 PITCH-</button>
                <button class="pro-btn" id="tempoUpBtn">⏩ TEMPO+</button>
                <button class="pro-btn" id="tempoDownBtn">⏪ TEMPO-</button>
                <button class="pro-btn" id="backspinBtn">🌀 BACKSPIN</button>
                <button class="pro-btn" id="brakeBtn">🛑 BRAKE</button>
                <button class="pro-btn" id="cutBtn">✂️ CUT</button>
                <button class="pro-btn" id="dropBtn">💣 DROP</button>
                <button class="pro-btn" id="rollBtn">🥁 ROLL 1/4</button>
                <button class="pro-btn" id="rollBtn2">🥁 ROLL 1/8</button>
                <button class="pro-btn" id="loopInBtn">➡️ LOOP IN</button>
                <button class="pro-btn" id="loopOutBtn">⬅️ LOOP OUT</button>
                <button class="pro-btn" id="filterBtn">🌀 FILTER</button>
                <button class="pro-btn" id="reverbBtn">🏛️ REVERB</button>
                <button class="pro-btn" id="echoBtn">🌊 ECHO</button>
                <button class="pro-btn" id="resetBtn">🔄 RESET</button>
            </div>
        </div>

        <div class="effect-section">
            <div class="effect-title">⚡ PITCH & TEMPO</div>
            <div class="slider-group"><label>Pitch: <span id="pitchVal">1.0</span>x</label><input type="range" id="pitch" min="0.5" max="2" step="0.01" value="1"></div>
            <div class="slider-group"><label>Tempo: <span id="tempoVal">1.0</span>x</label><input type="range" id="tempo" min="0.5" max="2" step="0.01" value="1"></div>
        </div>
        <div class="effect-section">
            <div class="effect-title">🎚️ EQ 5-BAND</div>
            <div class="eq-grid">
                <div><input type="range" class="eq-slider" id="eq60" min="-20" max="20" value="0"><br><label>60Hz</label></div>
                <div><input type="range" class="eq-slider" id="eq250" min="-20" max="20" value="0"><br><label>250Hz</label></div>
                <div><input type="range" class="eq-slider" id="eq1k" min="-20" max="20" value="0"><br><label>1kHz</label></div>
                <div><input type="range" class="eq-slider" id="eq4k" min="-20" max="20" value="0"><br><label>4kHz</label></div>
                <div><input type="range" class="eq-slider" id="eq12k" min="-20" max="20" value="0"><br><label>12kHz</label></div>
            </div>
        </div>
    </div>

    <div id="adStatus">Siap</div>
    <div id="vast-player" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999;"></div>
    <div id="vast-loading" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1000000; color:#ff0080; font-weight:bold; font-size:16px; text-align:center;">Tonton Iklan Dulu Ya...</div>

    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <script>let ctx, src, gain, analyser, delay, eq60, eq250, eq1k, eq4k, eq12k, lowpass, highpass;
        let mediaRec, chunks = [], cuePoint = 0, hotCues = {}, loopIn = 0, loopOut = 0, loopActive = false;
        let lastRecordedUrl = null, audioReady = false;
        const player = document.getElementById('audioPlayer');
        const canvas = document.getElementById('visualizer');
        const ctx2d = canvas.getContext('2d');

        // URL IKLAN UDAH DIGANTI PAKE PUNYA KAKAK ✅
        const HILLTOP_VAST_URL = 'https://unequaledwinter.com/dmm.FVzadtG-NlvUZRGDUi/xeGmU9cuvZ/UilNk/PyTccmwOMWTXARz/OKDTEht/N-znAlxoMtDwM/4GNrQb';
        let adsLoader, adsManager, adDisplayContainer, videoContent, lastAdTime = 0, pendingAction = null;

        function rewardedAction(callback) {
            const now = Date.now();
            if (now - lastAdTime < 10000) {
                document.getElementById('adStatus').textContent = 'Gratis!';
                callback();
                setTimeout(() => document.getElementById('adStatus').textContent = 'Siap', 1000);
                return;
            }
            if (!adsLoader ||!window.google ||!google.ima) {
                console.log('Iklan skip, IMA gak ready');
                callback();
                return;
            }
            pendingAction = callback;
            document.getElementById('vast-player').style.display = 'block';
            document.getElementById('vast-loading').style.display = 'block';
            try {
                adDisplayContainer.initialize();
                const adsRequest = new google.ima.AdsRequest();
                adsRequest.adTagUrl = HILLTOP_VAST_URL;
                adsRequest.linearAdSlotWidth = window.innerWidth;
                adsRequest.linearAdSlotHeight = window.innerHeight;
                adsLoader.requestAds(adsRequest);
            } catch (e) {
                onAdComplete();
            }
        }

        function onAdComplete() {
            document.getElementById('vast-player').style.display = 'none';
            document.getElementById('vast-loading').style.display = 'none';
            lastAdTime = Date.now();
            if (adsManager) adsManager.destroy();
            if (pendingAction) { pendingAction(); pendingAction = null; }
        }

        function onAdError() { onAdComplete(); }

        function initVast() {
            videoContent = document.createElement('video');
            videoContent.style.width = '100%';
            videoContent.style.height = '100%';
            videoContent.setAttribute('playsinline', '');
            document.getElementById('vast-player').appendChild(videoContent);
            adDisplayContainer = new google.ima.AdDisplayContainer(document.getElementById('vast-player'), videoContent);
            adsLoader = new google.ima.AdsLoader(adDisplayContainer);
            adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, (e) => {
                adsManager = e.getAdsManager(videoContent);
                adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
                adsManager.addEventListener(google.ima.AdEvent.Type.COMPLETE, onAdComplete);
                adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED, onAdComplete);
                adsManager.addEventListener(google.ima.AdEvent.Type.SKIPPED, onAdComplete);
                adsManager.addEventListener(google.ima.AdEvent.Type.LOADED, () => {
                    document.getElementById('vast-loading').style.display = 'none';
                });
                try {
                    adsManager.init(window.innerWidth, window.innerHeight, google.ima.ViewMode.NORMAL);
                    adsManager.start();
                } catch (adError) { onAdComplete(); }
            });
            adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
        }

        async function initAudioContext() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                src = ctx.createMediaElementSource(player);
                eq60 = ctx.createBiquadFilter(); eq60.type = 'lowshelf'; eq60.frequency.value = 60;
                eq250 = ctx.createBiquadFilter(); eq250.type = 'peaking'; eq250.frequency.value = 250; eq250.Q.value = 1;
                eq1k = ctx.createBiquadFilter(); eq1k.type = 'peaking'; eq1k.frequency.value = 1000; eq1k.Q.value = 1;
                eq4k = ctx.createBiquadFilter(); eq4k.type = 'peaking'; eq4k.frequency.value = 4000; eq4k.Q.value = 1;
                eq12k = ctx.createBiquadFilter(); eq12k.type = 'highshelf'; eq12k.frequency.value = 12000;
                lowpass = ctx.createBiquadFilter(); lowpass.type = 'lowpass'; lowpass.frequency.value = 20000;
                highpass = ctx.createBiquadFilter(); highpass.type = 'highpass'; highpass.frequency.value = 20;
                delay = ctx.createDelay(1.0); delay.delayTime.value = 0;
                gain = ctx.createGain();
                analyser = ctx.createAnalyser();
                src.connect(eq60).connect(eq250).connect(eq1k).connect(eq4k).connect(eq12k).connect(lowpass).connect(highpass).connect(delay).connect(gain).connect(analyser).connect(ctx.destination);
                analyser.fftSize = 256;
                visual();
                audioReady = true;
            }
            if (ctx.state === 'suspended') await ctx.resume();
        }

        function handleFileClick() {
            rewardedAction(() => document.getElementById('audioFile').click());
        }

        document.getElementById('audioFile').onchange = e => {
            const f = e.target.files[0];
            if (f) {
                const reader = new FileReader();
                reader.onload = async evt => {
                    player.src = evt.target.result;
                    await initAudioContext();
                    player.load();
                };
                reader.readAsDataURL(f);
            }
        };

        // TRANSPORT - PAKE IKLAN
        document.getElementById('playBtn').onclick = () => rewardedAction(async () => { await initAudioContext(); player.play(); });
        document.getElementById('pauseBtn').onclick = () => rewardedAction(() => player.pause());
        document.getElementById('stopBtn').onclick = () => rewardedAction(() => { player.pause(); player.currentTime = 0; });
        document.getElementById('cueBtn').onclick = () => rewardedAction(async () => {
            await initAudioContext();
            if (player.paused && cuePoint > 0) {
                player.currentTime = cuePoint; player.play();
            } else {
                cuePoint = player.currentTime;
            }
        });
        document.getElementById('loopBtn').onclick = () => rewardedAction(() => {
            player.loop =!player.loop;
            document.getElementById('loopBtn').classList.toggle('active');
        });
        document.getElementById('jedagBtn').onclick = () => rewardedAction(() => {
            const btn = document.getElementById('jedagBtn');
            btn.classList.toggle('jedag-mode');
            if (btn.classList.contains('jedag-mode')) {
                document.getElementById('eq60').value = 18;
                document.getElementById('eq250').value = 10;
                document.getElementById('pitch').value = 0.85;
                update();
            } else {
                document.getElementById('eq60').value = 0;
                document.getElementById('eq250').value = 0;
                document.getElementById('pitch').value = 1;
                update();
            }
        });
        document.getElementById('syncBtn').onclick = () => rewardedAction(() => {
            document.getElementById('tempo').value = 1;
            update();
        });

        // REC - TANPA IKLAN ✅
        document.getElementById('recBtn').onclick = async () => {
            await initAudioContext();
            const btn = document.getElementById('recBtn');
            const downloadBtn = document.getElementById('downloadRecBtn');
            const recStatus = document.getElementById('recStatus');
            if (!mediaRec || mediaRec.state === 'inactive') {
                document.body.classList.add('recording');
                downloadBtn.style.display = 'none';
                recStatus.innerText = '🔴 Sedang Merekam...';
                const dest = ctx.createMediaStreamDestination();
                gain.connect(dest);
                mediaRec = new MediaRecorder(dest.stream);
                chunks = [];
                mediaRec.ondataavailable = e => chunks.push(e.data);
                mediaRec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    lastRecordedUrl = URL.createObjectURL(blob);
                    downloadBtn.style.display = 'block';
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = lastRecordedUrl;
                        a.download = `DJ_PRO_V3_MIX_${Date.now()}.webm`;
                        a.click();
                        recStatus.innerText = '✅ Berhasil di-download!';
                    };
                    recStatus.innerText = '✅ Rekaman selesai!';
                };
                mediaRec.start();
                btn.textContent = '⏹️STOP';
                btn.classList.add('active');
            } else {
                document.body.classList.remove('recording');
                mediaRec.stop();
                btn.textContent = '🔴 REC';
                btn.classList.remove('active');
                recStatus.innerText = 'Memproses...';
            }
        };

        // HOT CUE
        document.querySelectorAll('.hotcue-btn').forEach(btn => {
            btn.onclick = () => rewardedAction(async () => {
                await initAudioContext();
                const cueNum = btn.dataset.cue;
                if (hotCues[cueNum]!== undefined) {
                    player.currentTime = hotCues[cueNum];
                    if (player.paused) player.play();
                } else {
                    hotCues[cueNum] = player.currentTime;
                    btn.classList.add('set');
                    btn.textContent = `CUE ${cueNum} ✓`;
                }
            });
        });

        // FX SAMPLER
        function playFX(type) {
            const osc = ctx.createOscillator();
            const fxGain = ctx.createGain();
            osc.connect(fxGain).connect(ctx.destination);
            fxGain.gain.setValueAtTime(0.3, ctx.currentTime);
            if (type === 'airhorn') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                fxGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            }
            if (type === 'siren') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.5);
                fxGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
                osc.start(); osc.stop(ctx.currentTime + 1);
            }
            if (type === 'scratch') {
                if(!player.paused) {
                    const t = player.currentTime;
                    player.currentTime = Math.max(0, t - 0.3);
                    setTimeout(() => player.currentTime = t + 0.3, 150);
                }
            }
        }

        document.querySelectorAll('.fx-btn').forEach(btn => {
            btn.onclick = () => rewardedAction(async () => {
                await initAudioContext();
                playFX(btn.dataset.fx);
            });
        });

        // PRO TOOLS
        document.getElementById('pitchUpBtn').onclick = () => rewardedAction(() => {
            const pitch = document.getElementById('pitch');
            pitch.value = Math.min(2, parseFloat(pitch.value) + 0.05).toFixed(2);
            update();
        });
        document.getElementById('pitchDownBtn').onclick = () => rewardedAction(() => {
            const pitch = document.getElementById('pitch');
            pitch.value = Math.max(0.5, parseFloat(pitch.value) - 0.05).toFixed(2);
            update();
        });
        document.getElementById('tempoUpBtn').onclick = () => rewardedAction(() => {
            const tempo = document.getElementById('tempo');
            tempo.value = Math.min(2, parseFloat(tempo.value) + 0.05).toFixed(2);
            update();
        });
        document.getElementById('tempoDownBtn').onclick = () => rewardedAction(() => {
            const tempo = document.getElementById('tempo');
            tempo.value = Math.max(0.5, parseFloat(tempo.value) - 0.05).toFixed(2);
            update();
        });
        document.getElementById('backspinBtn').onclick = () => rewardedAction(async () => {
            await initAudioContext();
            const oldRate = player.playbackRate;
            player.playbackRate = -3;
            setTimeout(() => player.playbackRate = oldRate, 400);
        });
        document.getElementById('brakeBtn').onclick = () => rewardedAction(async () => {
            await initAudioContext();
            let rate = player.playbackRate;
            const brake = setInterval(() => {
                rate -= 0.1;
                if(rate <= 0.1) {
                    player.pause();
                    player.playbackRate = 1;
                    clearInterval(brake);
                } else {
                    player.playbackRate = rate;
                }
            }, 50);
        });
        document.getElementById('cutBtn').onclick = () => rewardedAction(() => {
            gain.gain.setValueAtTime(0, ctx.currentTime);
            setTimeout(() => gain.gain.setValueAtTime(1, ctx.currentTime), 100);
        });
        document.getElementById('dropBtn').onclick = () => rewardedAction(async () => {
            await initAudioContext();
            document.getElementById('eq60').value = 20;
            document.getElementById('pitch').value = 0.7;
            update();
            setTimeout(() => {
                document.getElementById('eq60').value = 0;
                document.getElementById('pitch').value = 1;
                update();
            }, 800);
        });
        document.getElementById('rollBtn').onclick = () => rewardedAction(() => {
            const pos = player.currentTime;
            let i = 0;
            const roll = setInterval(() => {
                player.currentTime = pos;
                i++;
                if(i >= 4) clearInterval(roll);
            }, 250);
        });
        document.getElementById('rollBtn2').onclick = () => rewardedAction(() => {
            const pos = player.currentTime;
            let i = 0;
            const roll = setInterval(() => {
                player.currentTime = pos;
                i++;
                if(i >= 8) clearInterval(roll);
            }, 125);
        });
        document.getElementById('loopInBtn').onclick = () => rewardedAction(() => {
            loopIn = player.currentTime;
            document.getElementById('loopInBtn').classList.add('active');
        });
        document.getElementById('loopOutBtn').onclick = () => rewardedAction(() => {
            loopOut = player.currentTime;
            loopActive = true;
            document.getElementById('loopOutBtn').classList.add('active');
        });
        document.getElementById('filterBtn').onclick = () => rewardedAction(() => {
            let freq = 20000;
            const sweep = setInterval(() => {
                freq -= 500;
                document.getElementById('lowpass').value = freq;
                update();
                if(freq <= 500) {
                    clearInterval(sweep);
                    document.getElementById('lowpass').value = 20000;
                    update();
                }
            }, 30);
        });
        document.getElementById('reverbBtn').onclick = () => rewardedAction(() => {
            document.getElementById('reverb').value = 1;
            update();
            setTimeout(() => {
                document.getElementById('reverb').value = 0;
                update();
            }, 1000);
        });
        document.getElementById('echoBtn').onclick = () => rewardedAction(() => {
            document.getElementById('echo').value = 0.5;
            update();
            setTimeout(() => {
                document.getElementById('echo').value = 0;
                update();
            }, 2000);
        });
        document.getElementById('resetBtn').onclick = () => rewardedAction(() => {
            document.querySelectorAll('input[type=range]').forEach(s => {
                if(s.id.includes('eq')) s.value = 0;
                else if(s.id === 'pitch' || s.id === 'tempo') s.value = 1;
                else if(s.id === 'lowpass') s.value = 20000;
                else if(s.id === 'highpass') s.value = 20;
                else s.value = 0;
            });
            update();
            loopActive = false;
            document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
        });

        function update() {
            if (!audioReady) return;
            ['pitch','tempo','eq60','eq250','eq1k','eq4k','eq12k','lowpass','highpass'].forEach(id => {
                const valEl = document.getElementById(id+'Val');
                if(valEl) valEl.textContent = document.getElementById(id).value;
            });
            player.playbackRate = parseFloat(document.getElementById('tempo').value);
            eq60.gain.value = document.getElementById('eq60').value;
            eq250.gain.value = document.getElementById('eq250').value;
            eq1k.gain.value = document.getElementById('eq1k').value;
            eq4k.gain.value = document.getElementById('eq4k').value;
            eq12k.gain.value = document.getElementById('eq12k').value;
            lowpass.frequency.value = document.getElementById('lowpass').value;
            highpass.frequency.value = document.getElementById('highpass').value;
        }

        document.querySelectorAll('input[type=range]').forEach(s => s.oninput = () => rewardedAction(update));

        function visual() {
            const buf = new Uint8Array(analyser.frequencyBinCount);
            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(buf);
                ctx2d.fillStyle = '#000';
                ctx2d.fillRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < buf.length; i++) {
                    const h = buf[i] / 2;
                    const g = ctx2d.createLinearGradient(0, 0, 0, canvas.height);
                    g.addColorStop(0, '#ff0080'); g.addColorStop(1, '#7928ca');
                    ctx2d.fillStyle = g;
                    ctx2d.fillRect(i * 3, canvas.height - h, 2, h);
                }
                if (loopActive && loopOut > loopIn && player.currentTime >= loopOut) {
                    player.currentTime = loopIn;
                }
            }
            draw();
        }

        document.body.addEventListener('click', async () => {
            if (ctx && ctx.state === 'suspended') await ctx.resume();
        }, { once: true });

        window.addEventListener('load', () => {
            if (window.google && google.ima) initVast();
        });
    </script>
</body>
</html>
