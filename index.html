<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ PRO - Jedag Jedug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            padding-bottom: 70px!important; /* Biar gak ketutup banner iklan */
            min-height: 100vh;
        }

       .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #ff0080;
            text-shadow: 0 0 10px #ff0080;
            margin-bottom: 20px;
            font-size: 28px;
        }

       .upload-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid #ff0080;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #ff0080;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 15px;
        }

       .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px;
            background: linear-gradient(45deg, #ff0080, #7928ca);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff0080;
        }

        button:active {
            transform: scale(0.95);
        }

       .effect-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

       .effect-title {
            color: #ff0080;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
        }

       .slider-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #2a2a2a;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ff0080;
            border-radius: 50%;
            cursor: pointer;
        }

       .jedag-mode {
            background: linear-gradient(45deg, #ff0000, #ff8800)!important;
            animation: jedag 0.5s infinite;
        }

        @keyframes jedag {
            0%, 100% { box-shadow: 0 0 20px #ff0000; }
            50% { box-shadow: 0 0 40px #ff8800; }
        }

       .visualizer {
            width: 100%;
            height: 100px;
            background: #000;
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid #ff0080;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 DJ PRO JEDAG 🎧</h1>

        <div class="upload-section">
            <input type="file" id="audioFile" accept="audio/*">
            <audio id="audioPlayer" controls style="width:100%; margin-top:10px;"></audio>
            <canvas id="visualizer" class="visualizer"></canvas>
        </div>

        <div class="controls">
            <button id="playBtn">▶️ PLAY</button>
            <button id="pauseBtn">⏸️ PAUSE</button>
            <button id="recordBtn">🔴 RECORD</button>
            <button id="jedagBtn">💥 JEDAG MODE</button>
        </div>

        <div class="effect-section">
            <div class="effect-title">🎚️ REVERB & ECHO</div>
            <div class="slider-group">
                <label>Reverb: <span id="reverbVal">0</span></label>
                <input type="range" id="reverb" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="slider-group">
                <label>Echo Delay: <span id="echoVal">0</span>ms</label>
                <input type="range" id="echo" min="0" max="1" step="0.01" value="0">
            </div>
        </div>

        <div class="effect-section">
            <div class="effect-title">🔊 BASS BOOST</div>
            <div class="slider-group">
                <label>Bass: <span id="bassVal">0</span>dB</label>
                <input type="range" id="bass" min="0" max="20" step="1" value="0">
            </div>
            <div class="slider-group">
                <label>Treble: <span id="trebleVal">0</span>dB</label>
                <input type="range" id="treble" min="0" max="20" step="1" value="0">
            </div>
        </div>
    </div>

    <!-- IKLAN BANNER ADMOB - PUNYA KAKAK -->
    <div style="position:fixed; bottom:0; left:0; width:100%; text-align:center; background:#0a0a0a; padding:4px 0; z-index:9999; border-top:1px solid #ff0080;">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-app-pub-7494355873576252"
             data-ad-slot="9622283309"></ins>
    </div>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-7494355873576252" crossorigin="anonymous"></script>
    <script>
        // Inisialisasi Iklan
        (adsbygoogle = window.adsbygoogle || []).push({});

        // AUDIO CONTEXT SETUP
        let audioContext;
        let audioSource;
        let gainNode;
        let bassFilter;
        let trebleFilter;
        let reverbNode;
        let delayNode;
        let analyser;
        let mediaRecorder;
        let recordedChunks = [];

        const audioPlayer = document.getElementById('audioPlayer');
        const audioFile = document.getElementById('audioFile');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // INIT AUDIO
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioSource = audioContext.createMediaElementSource(audioPlayer);

                gainNode = audioContext.createGain();
                bassFilter = audioContext.createBiquadFilter();
                trebleFilter = audioContext.createBiquadFilter();
                delayNode = audioContext.createDelay();
                analyser = audioContext.createAnalyser();

                bassFilter.type = 'lowshelf';
                bassFilter.frequency.value = 200;
                trebleFilter.type = 'highshelf';
                trebleFilter.frequency.value = 3000;

                audioSource.connect(bassFilter);
                bassFilter.connect(trebleFilter);
                trebleFilter.connect(delayNode);
                delayNode.connect(gainNode);
                gainNode.connect(analyser);
                analyser.connect(audioContext.destination);

                analyser.fftSize = 256;
                visualize();
            }
        }

        // FILE UPLOAD
        audioFile.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audioPlayer.src = url;
                initAudio();
            }
        });

        // CONTROLS
        document.getElementById('playBtn').addEventListener('click', () => {
            initAudio();
            audioPlayer.play();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            audioPlayer.pause();
        });

        document.getElementById('jedagBtn').addEventListener('click', function() {
            this.classList.toggle('jedag-mode');
            if (this.classList.contains('jedag-mode')) {
                document.getElementById('bass').value = 15;
                document.getElementById('reverb').value = 0.6;
                document.getElementById('echo').value = 0.3;
                updateEffects();
            } else {
                document.getElementById('bass').value = 0;
                document.getElementById('reverb').value = 0;
                document.getElementById('echo').value = 0;
                updateEffects();
            }
        });

        // EFFECTS
        function updateEffects() {
            if (!audioContext) return;

            const reverbVal = document.getElementById('reverb').value;
            const echoVal = document.getElementById('echo').value;
            const bassVal = document.getElementById('bass').value;
            const trebleVal = document.getElementById('treble').value;

            document.getElementById('reverbVal').textContent = reverbVal;
            document.getElementById('echoVal').textContent = Math.round(echoVal * 500);
            document.getElementById('bassVal').textContent = bassVal;
            document.getElementById('trebleVal').textContent = trebleVal;

            bassFilter.gain.value = bassVal;
            trebleFilter.gain.value = trebleVal;
            delayNode.delayTime.value = echoVal * 0.5;
        }

        document.getElementById('reverb').addEventListener('input', updateEffects);
        document.getElementById('echo').addEventListener('input', updateEffects);
        document.getElementById('bass').addEventListener('input', updateEffects);
        document.getElementById('treble').addEventListener('input', updateEffects);

        // VISUALIZER
        function visualize() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = dataArray[i] / 2;
                    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    gradient.addColorStop(0, '#ff0080');
                    gradient.addColorStop(1, '#7928ca');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }

        // RECORD
        document.getElementById('recordBtn').addEventListener('click', function() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                const dest = audioContext.createMediaStreamDestination();
                gainNode.connect(dest);
                mediaRecorder = new MediaRecorder(dest.stream);
                recordedChunks = [];

                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'DJ-Mix-Recording.webm';
                    a.click();
                };

                mediaRecorder.start();
                this.textContent = '⏹️ STOP RECORD';
                this.style.background = 'linear-gradient(45deg, #ff0000, #880000)';
            } else {
                mediaRecorder.stop();
                this.textContent = '🔴 RECORD';
                this.style.background = 'linear-gradient(45deg, #ff0080, #7928ca)';
            }
        });
    </script>
</body>
</html>
