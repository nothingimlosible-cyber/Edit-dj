<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ SIMPLE - ANTI GAGAL</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#fff;font-family:system-ui;padding:15px}.header{text-align:center;padding:15px;background:#1e293b;border-radius:10px;margin-bottom:15px}.status{background:#ef4444;padding:12px;text-align:center;border-radius:8px;font-weight:700;margin-bottom:15px}.status.ready{background:#22c55e}.deck{background:#1a1a1a;padding:20px;border-radius:12px;margin-bottom:15px;border:2px solid #2a2a2a}.deck h2{color:#3b82f6;text-align:center;margin-bottom:15px}audio{width:100%;margin:10px 0;border-radius:8px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}.btn{background:#2a2a2a;border:none;color:white;padding:12px;border-radius:8px;font-weight:600;font-size:14px}.btn:active{transform:scale(0.95)}.btn-jedag{background:#ef4444}.slider-box{margin:15px 0}.slider-box label{display:flex;justify-content:space-between;font-size:12px;color:#9ca3af;margin-bottom:5px}.slider-box input{width:100%;height:8px}.track-info{text-align:center;font-size:12px;color:#22c55e;margin:8px 0}.fx-box{background:#0a0a0a;padding:15px;border-radius:8px;margin-top:15px}
  </style>
</head>
<body>
  <div class="header"><h1>🎧 DJ SIMPLE - PASTI BUNYI</h1></div>
  <div class="status" id="status">1. Pilih file MP3 di bawah 2. Klik Play</div>

  <div class="deck">
    <h2>DECK A</h2>
    <input type="file" id="fileA" accept="audio/*">
    <div class="track-info" id="infoA">No Track</div>
    <audio id="audioA" controls></audio>
    
    <div class="slider-box">
      <label>SPEED/TEMPO: <span id="speedAVal">1.00x</span></label>
      <input type="range" id="speedA" min="0.5" max="1.5" step="0.01" value="1">
    </div>
    
    <div class="controls">
      <button class="btn btn-jedag" id="jedagA">🔥 JEDAG</button>
      <button class="btn" id="sadA">😢 SAD</button>
      <button class="btn" id="lofiA">☕ LOFI</button>
      <button class="btn" id="resetA">RESET</button>
    </div>

    <div class="fx-box">
      <div class="slider-box">
        <label>BASS BOOST: <span id="bassAVal">0</span></label>
        <input type="range" id="bassA" min="0" max="20" value="0">
      </div>
      <div class="slider-box">
        <label>REVERB: <span id="reverbAVal">0%</span></label>
        <input type="range" id="reverbA" min="0" max="100" value="0">
      </div>
    </div>
  </div>

  <button class="btn btn-jedag" id="recBtn" style="width:100%;padding:15px;font-size:16px;">● REC MIX</button>

<script>
let audioA = document.getElementById('audioA');
let audioCtx, bassFilter, reverbNode, sourceA, gainNode, recorder, chunks = [];

// FILE LOAD - PALING SIMPLE
document.getElementById('fileA').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  document.getElementById('status').textContent = '⏳ Loading: ' + file.name;
  document.getElementById('infoA').textContent = file.name;
  
  // Pake URL biasa aja, 100% work
  const url = URL.createObjectURL(file);
  audioA.src = url;
  
  audioA.onloadeddata = () => {
    document.getElementById('status').textContent = '✅ READY! Klik Play di audio player';
    document.getElementById('status').className = 'status ready';
    document.getElementById('infoA').textContent = file.name + ' - ' + fmtTime(audioA.duration);
    setupAudioFX();
  };
  
  audioA.onerror = (e) => {
    document.getElementById('status').textContent = '❌ Error: File MP3 rusak / bukan MP3';
    alert('File error! Coba download MP3 lain dari Y2mate\nPastikan.mp3 bukan.m4a');
  };
};

// WEB AUDIO API BUAT FX
function setupAudioFX() {
  if (audioCtx) return; // Udah ada
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  sourceA = audioCtx.createMediaElementSource(audioA);
  bassFilter = audioCtx.createBiquadFilter();
  bassFilter.type = 'lowshelf';
  bassFilter.frequency.value = 200;
  gainNode = audioCtx.createGain();
  
  sourceA.connect(bassFilter).connect(gainNode).connect(audioCtx.destination);
}

// TEMPO
document.getElementById('speedA').oninput = (e) => {
  audioA.playbackRate = parseFloat(e.target.value);
  document.getElementById('speedAVal').textContent = parseFloat(e.target.value).toFixed(2) + 'x';
};

// BASS BOOST
document.getElementById('bassA').oninput = (e) => {
  if (!bassFilter) setupAudioFX();
  bassFilter.gain.value = parseFloat(e.target.value);
  document.getElementById('bassAVal').textContent = e.target.value;
};

// PRESET 1-KLIK
document.getElementById('jedagA').onclick = () => {
  audioA.playbackRate = 0.85;
  document.getElementById('speedA').value = 0.85;
  document.getElementById('speedAVal').textContent = '0.85x';
  if (!bassFilter) setupAudioFX();
  bassFilter.gain.value = 18;
  document.getElementById('bassA').value = 18;
  document.getElementById('bassAVal').textContent = '18';
  alert('🔥 JEDAG AKTIF! Play lagunya');
};

document.getElementById('sadA').onclick = () => {
  audioA.playbackRate = 0.80;
  document.getElementById('speedA').value = 0.80;
  document.getElementById('speedAVal').textContent = '0.80x';
  alert('😢 SAD MODE! Play lagunya');
};

document.getElementById('lofiA').onclick = () => {
  audioA.playbackRate = 0.85;
  document.getElementById('speedA').value = 0.85;
  document.getElementById('speedAVal').textContent = '0.85x';
  if (!bassFilter) setupAudioFX();
  bassFilter.gain.value = 8;
  document.getElementById('bassA').value = 8;
  alert('☕ LOFI MODE! Play lagunya');
};

document.getElementById('resetA').onclick = () => {
  audioA.playbackRate = 1;
  document.getElementById('speedA').value = 1;
  document.getElementById('speedAVal').textContent = '1.00x';
  if (bassFilter) bassFilter.gain.value = 0;
  document.getElementById('bassA').value = 0;
  document.getElementById('bassAVal').textContent = '0';
};

// REC
document.getElementById('recBtn').onclick = async () => {
  if (!audioCtx) {
    alert('Play lagu dulu baru bisa REC!');
    return;
  }
  if (!recorder) {
    const dest = audioCtx.createMediaStreamDestination();
    gainNode.connect(dest);
    recorder = new MediaRecorder(dest.stream);
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunks, {type: 'audio/webm'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'DJ_Mix.webm';
      a.click();
      chunks = [];
    };
    recorder.start();
    document.getElementById('recBtn').textContent = '■ STOP REC';
    document.getElementById('recBtn').style.background = '#22c55e';
  } else {
    recorder.stop();
    recorder = null;
    document.getElementById('recBtn').textContent = '● REC MIX';
    document.getElementById('recBtn').style.background = '#ef4444';
  }
};

function fmtTime(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`}
</script>
</body>
</html>
