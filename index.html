<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ WEB PRO</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e5e5e5; font-family: system-ui; }
  .header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 15px 20px; text-align: center; border-bottom: 2px solid #3b82f6; }
  .header h1 { font-size: 22px; text-shadow: 0 0 20px #3b82f6; }
  .status { background: #ef4444; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; }
  .status.ready { background: #22c55e; }
  .dj-container { display: flex; gap: 15px; padding: 20px; max-width: 1400px; margin: 0 auto; }
  .deck { flex: 1; background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 12px; padding: 20px; }
  .deck h2 { text-align: center; margin-bottom: 15px; color: #3b82f6; font-size: 18px; }
  .waveform { width: 100%; height: 80px; background: #0a0a0a; border-radius: 8px; margin: 15px 0; }
  .waveform canvas { width: 100%; height: 100%; border-radius: 8px; }
  .jogwheel { width: 180px; height: 180px; margin: 20px auto; border-radius: 50%; background: radial-gradient(circle, #2a2a2a 0%, #0a0a0a 70%); border: 4px solid #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); cursor: grab; position: relative; transition: transform 0.05s; }
  .jogwheel:active { cursor: grabbing; }
  .jogwheel::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 40%; background: #3b82f6; transform: translate(-50%, -100%); border-radius: 2px; }
  .bpm-display { text-align: center; font-family: monospace; font-size: 28px; color: #22c55e; margin: 10px 0; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
  .btn { background: #2a2a2a; border: 1px solid #3a3a3a; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
  .btn:active { transform: scale(0.95); }
  .btn-play { background: #22c55e; border-color: #22c55e; }
  .btn-play.stop { background: #ef4444; border-color: #ef4444; }
  .slider-group { margin: 12px 0; }
  .slider-group label { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .slider-group input[type="range"] { width: 100%; height: 6px; background: #2a2a2a; border-radius: 3px; outline: none; }
  .slider-group input[type="range"]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; }
  .mixer { width: 140px; background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 12px; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
  .mixer h3 { margin-bottom: 20px; font-size: 14px; color: #3b82f6; }
  .crossfader { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 8px; height: 250px; background: #2a2a2a; margin: 20px 0; }
  .fx-panel { background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 12px; padding: 20px; margin: 20px; }
  .fx-panel h3 { margin-bottom: 15px; color: #3b82f6; text-align: center; }
  .fx-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
  .fx-box { background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #2a2a2a; }
  .fx-box h4 { font-size: 12px; margin-bottom: 12px; color: #9ca3af; text-align: center; }
  .eq-container { display: flex; gap: 15px; justify-content: center; }
  .eq-band { display: flex; flex-direction: column; align-items: center; }
  .eq-band input[type="range"] { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 8px; height: 120px; }
  .eq-band label { font-size: 10px; color: #9ca3af; margin-top: 8px; }
    input[type="file"] { width: 100%; font-size: 11px; margin-bottom: 10px; color: #9ca3af; }
    @media (max-width: 900px) {.dj-container { flex-direction: column; }.mixer { width: 100%; flex-direction: row; height: 100px; justify-content: center; }.crossfader { writing-mode: initial; width: 200px; height: 8px; } }
  </style>
</head>
<body>
  <div class="header"><h1>🎧 DJ WEB PRO - BASS + REVERB + SLOW</h1></div>
  <div class="status" id="status">⚠️ KLIK PLAY DI SALAH SATU DECK BUAT AKTIFIN AUDIO</div>

  <div class="dj-container">
    <div class="deck">
      <h2>DECK A</h2>
      <input type="file" id="fileA" accept="audio/*">
      <div class="waveform"><canvas id="waveA"></canvas></div>
      <div class="jogwheel" id="jogA"></div>
      <div class="bpm-display" id="bpmA">--- BPM</div>
      <div class="controls">
        <button class="btn btn-play" id="playA">▶ PLAY</button>
        <button class="btn" id="cueA">CUE</button>
        <button class="btn" id="syncA">SYNC</button>
        <button class="btn" id="loopA">LOOP</button>
      </div>
      <div class="slider-group">
        <label>SLOW/TEMPO: <span id="tempoAVal">1.00x</span></label>
        <input type="range" id="tempoA" min="0.5" max="1.5" step="0.01" value="1">
      </div>
      <div class="slider-group">
        <label>VOLUME: <span id="volAVal">0dB</span></label>
        <input type="range" id="volA" min="-60" max="6" value="0">
      </div>
    </div>

    <div class="mixer">
      <h3>MIXER</h3>
      <div style="font-size:10px; color:#9ca3af;">A</div>
      <input type="range" id="crossfader" min="0" max="1" step="0.01" value="0.5" class="crossfader">
      <div style="font-size:10px; color:#9ca3af;">B</div>
    </div>

    <div class="deck">
      <h2>DECK B</h2>
      <input type="file" id="fileB" accept="audio/*">
      <div class="waveform"><canvas id="waveB"></canvas></div>
      <div class="jogwheel" id="jogB"></div>
      <div class="bpm-display" id="bpmB">--- BPM</div>
      <div class="controls">
        <button class="btn btn-play" id="playB">▶ PLAY</button>
        <button class="btn" id="cueB">CUE</button>
        <button class="btn" id="syncB">SYNC</button>
        <button class="btn" id="loopB">LOOP</button>
      </div>
      <div class="slider-group">
        <label>SLOW/TEMPO: <span id="tempoBVal">1.00x</span></label>
        <input type="range" id="tempoB" min="0.5" max="1.5" step="0.01" value="1">
      </div>
      <div class="slider-group">
        <label>VOLUME: <span id="volBVal">0dB</span></label>
        <input type="range" id="volB" min="-60" max="6" value="0">
      </div>
    </div>
  </div>

  <div class="fx-panel">
    <h3>🔊 MASTER FX - BASS BOOST + REVERB + FILTER + ECHO</h3>
    <div class="fx-grid">
      <div class="fx-box">
        <h4>EQ 3-BAND / BASS BOOST</h4>
        <div class="eq-container">
          <div class="eq-band">
            <input type="range" id="bass" min="-20" max="20" value="0" orient="vertical">
            <label>BASS</label>
          </div>
          <div class="eq-band">
            <input type="range" id="mid" min="-20" max="20" value="0" orient="vertical">
            <label>MID</label>
          </div>
          <div class="eq-band">
            <input type="range" id="treble" min="-20" max="20" value="0" orient="vertical">
            <label>TREBLE</label>
          </div>
        </div>
      </div>

      <div class="fx-box">
        <h4>REVERB</h4>
        <div class="slider-group">
          <label>Mix: <span id="reverbVal">0%</span></label>
          <input type="range" id="reverb" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="slider-group">
          <label>Decay: <span id="decayVal">2.0s</span></label>
          <input type="range" id="decay" min="0.1" max="10" step="0.1" value="2">
        </div>
      </div>

      <div class="fx-box">
        <h4>ECHO / DELAY</h4>
        <div class="slider-group">
          <label>Mix: <span id="echoVal">0%</span></label>
          <input type="range" id="echo" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="slider-group">
          <label>Time: <span id="echoTimeVal">0.25s</span></label>
          <input type="range" id="echoTime" min="0.05" max="1" step="0.05" value="0.25">
        </div>
      </div>

      <div class="fx-box">
        <h4>FILTER SWEEP</h4>
        <div class="slider-group">
          <label>Cutoff: <span id="filterVal">20kHz</span></label>
          <input type="range" id="filter" min="20" max="20000" value="20000">
        </div>
        <div class="slider-group">
          <label>Resonance: <span id="resVal">0</span></label>
          <input type="range" id="resonance" min="0" max="20" value="0">
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
