<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ PRO V3 ULTIMATE</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0080">
    <link rel="icon" type="image/png" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; padding: 12px; padding-bottom: 80px!important; overflow-x: hidden; }
     .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #ff0080; text-shadow: 0 0 15px #ff0080; margin-bottom: 12px; font-size: 22px; }
     .upload-section { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #ff0080; }
     .file-btn { width: 100%; padding: 12px; background: linear-gradient(45deg, #ff0080, #7928ca); border: none; border-radius: 6px; color: #fff; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        audio { width: 100%; height: 32px; }
     .visualizer { width: 100%; height: 70px; background: #000; border-radius: 6px; margin: 8px 0; border: 1px solid #ff0080; }
     .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
        button { padding: 8px 4px; background: linear-gradient(45deg, #ff0080, #7928ca); border: none; border-radius: 6px; color: #fff; font-weight: bold; font-size: 10px; cursor: pointer; transition: all 0.1s; }
        button:active { transform: scale(0.9); }
     .fx-pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
     .fx-btn { background: linear-gradient(45deg, #ff8800, #ff0080)!important; height: 45px; font-size: 9px; }
     .effect-section { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
     .effect-title { color: #ff0080; margin-bottom: 6px; font-size: 13px; font-weight: bold; }
     .slider-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 3px; font-size: 11px; color: #ccc; }
        input[type="range"] { width: 100%; height: 4px; background: #2a2a2a; border-radius: 5px; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #ff0080; border-radius: 50%; cursor: pointer; }
     .eq-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; text-align: center; }
     .eq-slider { height: 80px!important; writing-mode: vertical-lr; direction: rtl; }
     .jedag-mode { background: linear-gradient(45deg, #ff0000, #ff8800)!important; animation: jedag 0.3s infinite; }
        @keyframes jedag { 0%, 100% { box-shadow: 0 0 15px #ff0000; } 50% { box-shadow: 0 0 30px #ff8800; } }
     .active { background: #00ff88!important; color: #000!important; }
        #infinixWarn { display:none; background:#ff8800; color:#000; padding:10px; text-align:center; font-weight:bold; margin-bottom:10px; border-radius:6px; }
        #adTimer { position:fixed; bottom:10px; right:10px; background:#ff0080; color:#fff; padding:4px 8px; border-radius:12px; font-size:10px; z-index:999; }
    </style>
</head>
<body>
    <div class="container">
        <div id="infinixWarn">
            📱 HP Infinix/Vivo? Klik ini biar bisa pilih lagu:
            <a href="intent://edit-dj.vercel.app#Intent;scheme=https;package=com.android.chrome;end" style="background:#000; color:#ff8800; padding:4px 8px; border-radius:4px;">BUKA CHROME</a>
        </div>
        <h1>🎧 DJ PRO V3 ULTIMATE</h1>
        <div class="upload-section">
            <input type="file" id="audioFile" accept="audio/*" hidden>
            <button class="file-btn" onclick="document.getElementById('audioFile').click()">📁 PILIH LAGU MP3</button>
            <audio id="audioPlayer" controls></audio>
            <canvas id="visualizer" class="visualizer"></canvas>
        </div>
        <div class="controls">
            <button id="playBtn">▶️</button>
            <button id="pauseBtn">⏸️</button>
            <button id="stopBtn">⏹️</button>
            <button id="cueBtn">CUE</button>
            <button id="loopBtn">🔄</button>
            <button id="recBtn">🔴</button>
            <button id="jedagBtn">💥JEDAG</button>
            <button id="flashBtn">⚡FLASH</button>
        </div>
        <div class="fx-pad">
            <button class="fx-btn" data-fx="airhorn">📢 AIRHORN</button>
            <button class="fx-btn" data-fx="siren">🚨 SIREN</button>
            <button class="fx-btn" data-fx="scratch">💿 SCRATCH</button>
            <button class="fx-btn" data-fx="buildup">📈 BUILDUP</button>
        </div>
        <div class="effect-section">
            <div class="effect-title">⚡ PITCH & TEMPO</div>
            <div class="slider-group"><label>Pitch: <span id="pitchVal">1.0</span>x</label><input type="range" id="pitch" min="0.5" max="2" step="0.05" value="1"></div>
            <div class="slider-group"><label>Tempo: <span id="tempoVal">1.0</span>x</label><input type="range" id="tempo" min="0.5" max="2" step="0.05" value="1"></div>
        </div>
        <div class="effect-section">
            <div class="effect-title">🎚️ EQ 5-BAND</div>
            <div class="eq-grid">
                <div><input type="range" class="eq-slider" id="eq60" min="-20" max="20" value="0"><br><label>60Hz</label></div>
                <div><input type="range" class="eq-slider" id="eq250" min="-20" max="20" value="0"><br><label>250Hz</label></div>
                <div><input type="range" class="eq-slider" id="eq1k" min="-20" max="20" value="0"><br><label>1kHz</label></div>
                <div><input type="range" class="eq-slider" id="eq4k" min="-20" max="20" value="0"><br><label>4kHz</label></div>
                <div><input type="range" class="eq-slider" id="eq12k" min="-20" max="20" value="0"><br><label>12kHz</label></div>
            </div>
        </div>
        <div class="effect-section">
            <div class="effect-title">🌊 EFFECTS</div>
            <div class="slider-group"><label>Reverb: <span id="reverbVal">0</span></label><input type="range" id="reverb" min="0" max="1" step="0.01" value="0"></div>
            <div class="slider-group"><label>Echo: <span id="echoVal">0</span></label><input type="range" id="echo" min="0" max="1" step="0.01" value="0"></div>
            <div class="slider-group"><label>Flanger: <span id="flangerVal">0</span></label><input type="range" id="flanger" min="0" max="1" step="0.01" value="0"></div>
            <div class="slider-group"><label>Distortion: <span id="distVal">0</span></label><input type="range" id="distortion" min="0" max="1" step="0.01" value="0"></div>
        </div>
        <div class="effect-section">
            <div class="effect-title">🔊 FILTER</div>
            <div class="slider-group"><label>Lowpass: <span id="lpVal">20000</span>Hz</label><input type="range" id="lowpass" min="100" max="20000" step="100" value="20000"></div>
            <div class="slider-group"><label>Highpass: <span id="hpVal">20</span>Hz</label><input type="range" id="highpass" min="20" max="5000" step="10" value="20"></div>
        </div>
    </div>

    <!-- TIMER IKLAN 30 DETIK -->
    <div id="adTimer">Iklan: 0:30</div>

    <!-- HILLTOPADS VAST AUTO -->
    <div id="vast-player" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999;"></div>
    <div id="vast-close" style="display:none; position:fixed; top:10px; right:10px; z-index:1000000; background:#ff0080; color:#fff; padding:8px 12px; border-radius:6px; font-weight:bold;">SKIP 5</div>

    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <script>
        if(navigator.userAgent.includes('Infinix') || navigator.userAgent.includes('XOS') || navigator.userAgent.includes('VivoBrowser')) {
            document.getElementById('infinixWarn').style.display = 'block';
        }

        let ctx, src, gain, analyser, delay, distortionNode, eq60, eq250, eq1k, eq4k, eq12k, lowpass, highpass;
        let mediaRec, chunks = [], cuePoint = 0, isFlash = false;
        const player = document.getElementById('audioPlayer');
        const canvas = document.getElementById('visualizer');
        const ctx2d = canvas.getContext('2d');

        // HILLTOPADS VAST CONFIG
        const HILLTOP_VAST_URL = 'https://unequaledwinter.com/dom/F/z.dCG/NJveZGG/UF/JeZmr9Iu/ZXU/lGkgPCTlc/wJM/TlACziOLDsE-tRNgzpA/xKMiDLM/4vNWQe';
        let adsLoader, adsManager, adDisplayContainer, videoContent;
        let adTimer = 30; // 30 DETIK 🔥
        let adInterval;
        let lastInteraction = Date.now();
        let adShownCount = 0;

        // Reset timer kalo user lagi aktif DJ-an
        ['click', 'touchstart', 'input'].forEach(evt => {
            document.addEventListener(evt, () => lastInteraction = Date.now());
        });

        async function initAudioContext() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                src = ctx.createMediaElementSource(player);
                eq60 = ctx.createBiquadFilter(); eq60.type = 'lowshelf'; eq60.frequency.value = 60;
                eq250 = ctx.createBiquadFilter(); eq250.type = 'peaking'; eq250.frequency.value = 250; eq250.Q.value = 1;
                eq1k = ctx.createBiquadFilter(); eq1k.type = 'peaking'; eq1k.frequency.value = 1000; eq1k.Q.value = 1;
                eq4k = ctx.createBiquadFilter(); eq4k.type = 'peaking'; eq4k.frequency.value = 4000; eq4k.Q.value = 1;
                eq12k = ctx.createBiquadFilter(); eq12k.type = 'highshelf'; eq12k.frequency.value = 12000;
                lowpass = ctx.createBiquadFilter(); lowpass.type = 'lowpass'; lowpass.frequency.value = 20000;
                highpass = ctx.createBiquadFilter(); highpass.type = 'highpass'; highpass.frequency.value = 20;
                delay = ctx.createDelay(1.0); delay.delayTime.value = 0;
                distortionNode = ctx.createWaveShaper();
                gain = ctx.createGain();
                analyser = ctx.createAnalyser();
                src.connect(eq60).connect(eq250).connect(eq1k).connect(eq4k).connect(eq12k).connect(lowpass).connect(highpass).connect(delay).connect(distortionNode).connect(gain).connect(analyser).connect(ctx.destination);
                analyser.fftSize = 256;
                visual();
            }
            if (ctx.state === 'suspended') await ctx.resume();
        }

        document.getElementById('audioFile').onchange = e => {
            const f = e.target.files[0];
            if (f) {
                const reader = new FileReader();
                reader.onload = async evt => {
                    player.src = evt.target.result;
                    await initAudioContext();
                    player.load();
                };
                reader.readAsDataURL(f);
            }
        };

        document.getElementById('playBtn').onclick = async () => { await initAudioContext(); player.play(); };
        document.getElementById('pauseBtn').onclick = () => player.pause();
        document.getElementById('stopBtn').onclick = () => { player.pause(); player.currentTime = 0; };

        document.getElementById('cueBtn').onclick = async function() {
            await initAudioContext();
            if (player.paused && cuePoint > 0) {
                player.currentTime = cuePoint; player.play();
                this.classList.add('active'); setTimeout(() => this.classList.remove('active'), 200);
            } else {
                cuePoint = player.currentTime;
                this.classList.add('active'); setTimeout(() => this.classList.remove('active'), 200);
            }
        };

        document.getElementById('loopBtn').onclick = function() { player.loop =!player.loop; this.classList.toggle('active'); };
        document.getElementById('flashBtn').onclick = function() { isFlash =!isFlash; this.classList.toggle('active'); };

        document.getElementById('jedagBtn').onclick = function() {
            this.classList.toggle('jedag-mode');
            if (this.classList.contains('jedag-mode')) {
                document.getElementById('eq60').value = 18;
                document.getElementById('eq250').value = 10;
                document.getElementById('pitch').value = 0.85;
                document.getElementById('lowpass').value = 8000;
                document.getElementById('distortion').value = 0.3;
                update();
            } else {
                document.getElementById('eq60').value = 0;
                document.getElementById('eq250').value = 0;
                document.getElementById('pitch').value = 1;
                document.getElementById('lowpass').value = 20000;
                document.getElementById('distortion').value = 0;
                update();
            }
        };

        // AUTO IKLAN 30 DETIK + SMART DETECTION
        function startAdTimer() {
            clearInterval(adInterval);
            adInterval = setInterval(() => {
                adTimer--;
                document.getElementById('adTimer').textContent = `Iklan: 0:${adTimer < 10? '0' + adTimer : adTimer}`;

                if (adTimer <= 0) {
                    clearInterval(adInterval);
                    // Cuma muncul kalo user aktif dalam 15 detik terakhir + belum liat 3x berturut2
                    if (Date.now() - lastInteraction < 15000 && adShownCount < 3) {
                        showAutoAd();
                        adShownCount++;
                    } else {
                        adShownCount = 0; // Reset kalo user diem
                    }
                    adTimer = 30; // Reset 30 detik lagi
                    startAdTimer();
                }
            }, 1000);
        }

        function showAutoAd() {
            document.getElementById('vast-player').style.display = 'block';
            document.getElementById('vast-close').style.display = 'block';

            let skipCount = 5;
            document.getElementById('vast-close').textContent = `SKIP ${skipCount}`;
            const skipInterval = setInterval(() => {
                skipCount--;
                document.getElementById('vast-close').textContent = `SKIP ${skipCount}`;
                if (skipCount <= 0) {
                    clearInterval(skipInterval);
                    document.getElementById('vast-close').textContent = 'SKIP';
                    document.getElementById('vast-close').onclick = closeAd;
                }
            }, 1000);

            adDisplayContainer.initialize();
            videoContent.load();

            const adsRequest = new google.ima.AdsRequest();
            adsRequest.adTagUrl = HILLTOP_VAST_URL;
            adsRequest.linearAdSlotWidth = window.innerWidth;
            adsRequest.linearAdSlotHeight = window.innerHeight;

            adsLoader.requestAds(adsRequest);
        }

        function closeAd() {
            document.getElementById('vast-player').style.display = 'none';
            document.getElementById('vast-close').style.display = 'none';
            document.getElementById('vast-close').onclick = null;
            if (adsManager) adsManager.destroy();
        }

        function initVast() {
            videoContent = document.createElement('video');
            videoContent.style.width = '100%';
            videoContent.style.height = '100%';
            videoContent.setAttribute('playsinline', '');
            videoContent.setAttribute('webkit-playsinline', '');
            document.getElementById('vast-player').appendChild(videoContent);

            adDisplayContainer = new google.ima.AdDisplayContainer(document.getElementById('vast-player'), videoContent);
            adsLoader = new google.ima.AdsLoader(adDisplayContainer);

            adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, (adsManagerLoadedEvent) => {
                adsManager = adsManagerLoadedEvent.getAdsManager(videoContent);
                adsManager.addEventListener(google.ima.AdEvent.Type.COMPLETE, closeAd);
                adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED, closeAd);
                adsManager.addEventListener(google.ima.AdEvent.Type.SKIPPED, closeAd);
                adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, closeAd);
                adsManager.init(window.innerWidth, window.innerHeight, google.ima.ViewMode.NORMAL);
                adsManager.start();
            });
            adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, closeAd);
        }

        // FX BUTTONS
        function playFX(type) {
            const osc = ctx.createOscillator();
            const fxGain = ctx.createGain();
            osc.connect(fxGain).connect(ctx.destination);
            fxGain.gain.setValueAtTime(0.3, ctx.currentTime);

            if (type === 'airhorn') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
                fxGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            }
            if (type === 'siren') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.5);
                osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 1);
                fxGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
                osc.start(); osc.stop(ctx.currentTime + 1);
            }
            if (type === 'scratch') {
                const noise = ctx.createBufferSource();
                const bufferSize = ctx.sampleRate * 0.2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer; noise.connect(fxGain); fxGain.gain.setValueAtTime(0.2, ctx.currentTime);
                noise.start(); noise.stop(ctx.currentTime + 0.2);
                if(!player.paused) {
                    const t = player.currentTime;
                    player.currentTime = Math.max(0, t - 0.3);
                    setTimeout(() => player.currentTime = t + 0.3, 150);
                }
            }
            if (type === 'buildup') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(2000, ctx.currentTime + 2);
                fxGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
                osc.start(); osc.stop(ctx.currentTime + 2);
                let p = 1.0, ot = document.getElementById('tempo').value, ol = document.getElementById('lowpass').value;
                const intv = setInterval(() => {
                    p += 0.05; player.playbackRate = p; lowpass.frequency.value = 20000 - (p * 3000);
                    if(p >= 1.5) clearInterval(intv);
                }, 100);
                setTimeout(() => { player.playbackRate = ot; lowpass.frequency.value = ol; }, 3000);
            }
        }

        document.querySelectorAll('.fx-btn').forEach(btn => {
            btn.onclick = async () => {
                await initAudioContext();
                playFX(btn.dataset.fx);
                btn.classList.add('active'); setTimeout(() => btn.classList.remove('active'), 300);
            };
        });

        function update() {
            if (!ctx) return;
            ['pitch','tempo','reverb','echo','flanger','distortion','eq60','eq250','eq1k','eq4k','eq12k','lowpass','highpass'].forEach(id => {
                const valEl = document.getElementById(id+'Val'); if(valEl) valEl.textContent = document.getElementById(id).value;
            });
            player.playbackRate = document.getElementById('tempo').value; player.preservesPitch = false;
            delay.delayTime.value = document.getElementById('echo').value * 0.5;
            eq60.gain.value = document.getElementById('eq60').value; eq250.gain.value = document.getElementById('eq250').value;
            eq1k.gain.value = document.getElementById('eq1k').value; eq4k.gain.value = document.getElementById('eq4k').value;
            eq12k.gain.value = document.getElementById('eq12k').value; lowpass.frequency.value = document.getElementById('lowpass').value;
            highpass.frequency.value = document.getElementById('highpass').value;
            const dist = document.getElementById('distortion').value * 100; distortionNode.curve = makeDistortionCurve(dist);
        }

        function makeDistortionCurve(amount) {
            const k = amount, n = 44100, curve = new Float32Array(n);
            for (let i = 0; i < n; i++) { const x = i * 2 / n - 1; curve[i] = (3 + k) * x * 20 * Math.PI / 180 / (Math.PI + k * Math.abs(x)); }
            return curve;
        }

        document.querySelectorAll('input[type=range]').forEach(s => s.oninput = update);

        function visual() {
            const buf = new Uint8Array(analyser.frequencyBinCount);
            function draw() {
                requestAnimationFrame(draw); analyser.getByteFrequencyData(buf);
                ctx2d.fillStyle = '#000'; ctx2d.fillRect(0, 0, canvas.width, canvas.height);
                let sum = 0;
                for (let i = 0; i < buf.length; i++) {
                    const h = buf[i] / 2; sum += buf[i];
                    const g = ctx2d.createLinearGradient(0, 0, 0, canvas.height);
                    g.addColorStop(0, '#ff0080'); g.addColorStop(1, '#7928ca');
                    ctx2d.fillStyle = g; ctx2d.fillRect(i * 3, canvas.height - h, 2, h);
                }
                if (isFlash && sum / buf.length > 100) {
                    document.body.style.background = '#ff0080'; setTimeout(() => document.body.style.background = '#0a0a0a', 50);
                }
            } draw();
        }

        document.getElementById('recBtn').onclick = async function() {
            await initAudioContext();
            if (!mediaRec || mediaRec.state === 'inactive') {
                const dest = ctx.createMediaStreamDestination(); gain.connect(dest);
                mediaRec = new MediaRecorder(dest.stream); chunks = [];
                mediaRec.ondataavailable = e => chunks.push(e.data);
                mediaRec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = 'DJ-PRO-MIX.webm'; a.click();
                };
                mediaRec.start(); this.textContent = '⏹️STOP'; this.classList.add('active');
            } else {
                mediaRec.stop(); this.textContent = '🔴'; this.classList.remove('active');
            }
        };

        // INIT
        window.addEventListener('load', () => {
            initVast();
            startAdTimer(); // MULAI TIMER 30 DETIK
        });
    </script>
</body>
</html>
