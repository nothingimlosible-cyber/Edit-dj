<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ PRO V3 ULTIMATE</title>

    <!-- 🔥 PWA WAJIB - JANGAN DIHAPUS KALO DEPLOY MEDIAN 🔥 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0080">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            padding: 12px;
            padding-bottom: 80px!important;
            overflow-x: hidden;
        }
  .container { max-width: 500px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #ff0080;
            text-shadow: 0 0 15px #ff0080;
            margin-bottom: 12px;
            font-size: 22px;
        }
  .upload-section {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #ff0080;
        }
      .file-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #ff0080, #7928ca);
            border: none;
            border-radius: 6px;
            color: #fff;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        audio { width: 100%; height: 32px; }
  .visualizer {
            width: 100%;
            height: 70px;
            background: #000;
            border-radius: 6px;
            margin: 8px 0;
            border: 1px solid #ff0080;
        }
  .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        button {
            padding: 8px 4px;
            background: linear-gradient(45deg, #ff0080, #7928ca);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.1s;
        }
        button:active { transform: scale(0.9); }
  .fx-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
  .fx-btn {
            background: linear-gradient(45deg, #ff8800, #ff0080)!important;
            height: 45px;
            font-size: 9px;
        }
  .effect-section {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
  .effect-title {
            color: #ff0080;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: bold;
        }
  .slider-group { margin-bottom: 10px; }
        label {
            display: block;
            margin-bottom: 3px;
            font-size: 11px;
            color: #ccc;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #2a2a2a;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff0080;
            border-radius: 50%;
            cursor: pointer;
        }
  .eq-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            text-align: center;
        }
  .eq-slider { height: 80px!important; writing-mode: vertical-lr; direction: rtl; }
  .jedag-mode { background: linear-gradient(45deg, #ff0000, #ff8800)!important; animation: jedag 0.3s infinite; }
        @keyframes jedag {
            0%, 100% { box-shadow: 0 0 15px #ff0000; }
            50% { box-shadow: 0 0 30px #ff8800; }
        }
  .active { background: #00ff88!important; color: #000!important; }
   #infinixWarn { display:none; background:#ff8800; color:#000; padding:10px; text-align:center; font-weight:bold; margin-bottom:10px; border-radius:6px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="infinixWarn">
            📱 HP Infinix/Vivo? Klik ini biar bisa pilih lagu:
            <a href="intent://edit-dj.vercel.app#Intent;scheme=https;package=com.android.chrome;end"
               style="background:#000; color:#ff8800; padding:4px 8px; border-radius:4px;">BUKA CHROME</a>
        </div>

        <h1>🎧 DJ PRO V3 ULTIMATE 🎧</h1>

        <div class="upload-section">
            <input type="file" id="audioFile" accept="audio/*" hidden>
            <button class="file-btn" onclick="document.getElementById('audioFile').click()">📁 PILIH LAGU MP3</button>
            <audio id="audioPlayer" controls></audio>
            <canvas id="visualizer" class="visualizer"></canvas>
        </div>

        <div class="controls">
            <button id="playBtn">▶️</button>
            <button id="pauseBtn">⏸️</button>
            <button id="stopBtn">⏹️</button>
            <button id="cueBtn">CUE</button>
            <button id="loopBtn">🔄</button>
            <button id="recBtn">🔴</button>
            <button id="jedagBtn">💥JEDAG</button>
            <button id="flashBtn">⚡FLASH</button>
        </div>

        <div class="fx-pad">
            <button class="fx-btn" data-fx="airhorn">📢 AIRHORN</button>
            <button class="fx-btn" data-fx="siren">🚨 SIREN</button>
            <button class="fx-btn" data-fx="scratch">💿 SCRATCH</button>
            <button class="fx-btn" data-fx="buildup">📈 BUILDUP</button>
        </div>

        <div class="effect-section">
            <div class="effect-title">⚡ PITCH & TEMPO</div>
            <div class="slider-group">
                <label>Pitch: <span id="pitchVal">1.0</span>x</label>
                <input type="range" id="pitch" min="0.5" max="2" step="0.05" value="1">
            </div>
            <div class="slider-group">
                <label>Tempo: <span id="tempoVal">1.0</span>x</label>
                <input type="range" id="tempo" min="0.5" max="2" step="0.05" value="1">
            </div>
        </div>

        <div class="effect-section">
            <div class="effect-title">🎚️ EQ 5-BAND</div>
            <div class="eq-grid">
                <div><input type="range" class="eq-slider" id="eq60" min="-20" max="20" value="0"><br><label>60Hz</label></div>
                <div><input type="range" class="eq-slider" id="eq250" min="-20" max="20" value="0"><br><label>250Hz</label></div>
                <div><input type="range" class="eq-slider" id="eq1k" min="-20" max="20" value="0"><br><label>1kHz</label></div>
                <div><input type="range" class="eq-slider" id="eq4k" min="-20" max="20" value="0"><br><label>4kHz</label></div>
                <div><input type="range" class="eq-slider" id="eq12k" min="-20" max="20" value="0"><br><label>12kHz</label></div>
            </div>
        </div>

        <div class="effect-section">
            <div class="effect-title">🌊 EFFECTS</div>
            <div class="slider-group">
                <label>Reverb: <span id="reverbVal">0</span></label>
                <input type="range" id="reverb" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="slider-group">
                <label>Echo: <span id="echoVal">0</span></label>
                <input type="range" id="echo" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="slider-group">
                <label>Flanger: <span id="flangerVal">0</span></label>
                <input type="range" id="flanger" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="slider-group">
                <label>Distortion: <span id="distVal">0</span></label>
                <input type="range" id="distortion" min="0" max="1" step="0.01" value="0">
            </div>
        </div>

        <div class="effect-section">
            <div class="effect-title">🔊 FILTER</div>
            <div class="slider-group">
                <label>Lowpass: <span id="lpVal">20000</span>Hz</label>
                <input type="range" id="lowpass" min="100" max="20000" step="100" value="20000">
            </div>
            <div class="slider-group">
                <label>Highpass: <span id="hpVal">20</span>Hz</label>
                <input type="range" id="highpass" min="20" max="5000" step="10" value="20">
            </div>
        </div>
    </div>

    <div style="position:fixed; bottom:0; left:0; width:100%; text-align:center; background:#0a0a0a; padding:4px 0; z-index:9999; border-top:1px solid #ff0080;">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-app-pub-7494355873576252"
             data-ad-slot="9622283309"></ins>
    </div>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-7494355873576252" crossorigin="anonymous"></script>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});

        // Deteksi Infinix/Vivo biar muncul tombol Buka Chrome
        if(navigator.userAgent.includes('Infinix') || navigator.userAgent.includes('XOS') || navigator.userAgent.includes('VivoBrowser')) {
            document.getElementById('infinixWarn').style.display = 'block';
        }

        // DJ ENGINE V3 - ULTIMATE FIXED 100%
        let ctx, src, gain, analyser, delay, distortionNode;
        let eq60, eq250, eq1k, eq4k, eq12k, lowpass, highpass;
        let mediaRec, chunks = [];
        let cuePoint = 0, isFlash = false;
        let fxBuffers = {};

        const player = document.getElementById('audioPlayer');
        const canvas = document.getElementById('visualizer');
        const ctx2d = canvas.getContext('2d');

        // FX SOUNDS - CDN aman CORS buat APK
        const fxUrls = {
            airhorn: 'https://cdn.pixabay.com/download/audio/2022/03/15/audio_9b4f69c5d1.mp3',
            siren: 'https://cdn.pixabay.com/download/audio/2022/03/24/audio_0bdfa6b7a8.mp3',
            scratch: 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_06a7d3d2b5.mp3',
            buildup: 'https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8a4e4b5a3.mp3'
        };

        async function initAudioContext() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                src = ctx.createMediaElementSource(player);

                // EQ Chain
                eq60 = ctx.createBiquadFilter(); eq60.type = 'lowshelf'; eq60.frequency.value = 60;
                eq250 = ctx.createBiquadFilter(); eq250.type = 'peaking'; eq250.frequency.value = 250; eq250.Q.value = 1;
                eq1k = ctx.createBiquadFilter(); eq1k.type = 'peaking'; eq1k.frequency.value = 1000; eq1k.Q.value = 1;
                eq4k = ctx.createBiquadFilter(); eq4k.type = 'peaking'; eq4k.frequency.value = 4000; eq4k.Q.value = 1;
                eq12k = ctx.createBiquadFilter(); eq12k.type = 'highshelf'; eq12k.frequency.value = 12000;

                // Filters
                lowpass = ctx.createBiquadFilter(); lowpass.type = 'lowpass'; lowpass.frequency.value = 20000;
                highpass = ctx.createBiquadFilter(); highpass.type = 'highpass'; highpass.frequency.value = 20;

                // Effects
                delay = ctx.createDelay(1.0); delay.delayTime.value = 0;
                distortionNode = ctx.createWaveShaper();

                gain = ctx.createGain();
                analyser = ctx.createAnalyser();

                // Connect Chain
                src.connect(eq60).connect(eq250).connect(eq1k).connect(eq4k).connect(eq12k)
              .connect(lowpass).connect(highpass).connect(delay).connect(distortionNode)
              .connect(gain).connect(analyser).connect(ctx.destination);

                analyser.fftSize = 256;
                visual();

                // Preload FX
                for (const fx in fxUrls) {
                    fetch(fxUrls[fx]).then(r => r.arrayBuffer()).then(buf => ctx.decodeAudioData(buf)).then(decoded => fxBuffers[fx] = decoded);
                }
            }
            if (ctx.state === 'suspended') await ctx.resume();
        }

        // FIX 00:00: PAKE FILEREADER, BUKAN createObjectURL
        document.getElementById('audioFile').onchange = e => {
            const f = e.target.files[0];
            if (f) {
                const reader = new FileReader();
                reader.onload = async evt => {
                    player.src = evt.target.result; // base64 aman buat TWA
                    await initAudioContext();
                    player.load();
                };
                reader.readAsDataURL(f);
            }
        };

        // CONTROLS
        document.getElementById('playBtn').onclick = async () => { await initAudioContext(); player.play(); };
        document.getElementById('pauseBtn').onclick = () => player.pause();
        document.getElementById('stopBtn').onclick = () => { player.pause(); player.currentTime = 0; };

        // CUE BENERAN KAYAK CDJ
        document.getElementById('cueBtn').onclick = async function() {
            await initAudioContext();
            if (player.paused && cuePoint > 0) {
                player.currentTime = cuePoint;
                player.play();
                this.classList.add('active');
                setTimeout(() => this.classList.remove('active'), 200);
            } else {
                cuePoint = player.currentTime;
                this.classList.add('active');
                setTimeout(() => this.classList.remove('active'), 200);
            }
        };

        document.getElementById('loopBtn').onclick = function() {
            player.loop =!player.loop;
            this.classList.toggle('active');
        };
        document.getElementById('flashBtn').onclick = function() {
            isFlash =!isFlash;
            this.classList.toggle('active');
        };

        document.getElementById('jedagBtn').onclick = function() {
            this.classList.toggle('jedag-mode');
            if (this.classList.contains('jedag-mode')) {
                document.getElementById('eq60').value = 15;
                document.getElementById('eq250').value = 8;
                document.getElementById('reverb').value = 0.7;
                document.getElementById('pitch').value = 0.85;
                document.getElementById('lowpass').value = 8000;
                update();
            } else {
                document.getElementById('eq60').value = 0;
                document.getElementById('eq250').value = 0;
                document.getElementById('reverb').value = 0;
                document.getElementById('pitch').value = 1;
                document.getElementById('lowpass').value = 20000;
                update();
            }
        };

        // FX PAD BENERAN - GAK PAJANGAN
        document.querySelectorAll('.fx-btn').forEach(btn => {
            btn.onclick = async () => {
                await initAudioContext();
                if (fxBuffers[btn.dataset.fx]) {
                    const source = ctx.createBufferSource();
                    source.buffer = fxBuffers[btn.dataset.fx];
                    source.connect(ctx.destination);
                    source.start(0);
                    btn.classList.add('active');
                    setTimeout(() => btn.classList.remove('active'), 300);

                    // SCRATCH BENERAN: Gesek lagu 0.3 detik
                    if(btn.dataset.fx === 'scratch' &&!player.paused) {
                        const currentTime = player.currentTime;
                        player.currentTime = Math.max(0, currentTime - 0.3);
                        setTimeout(() => player.currentTime = currentTime + 0.3, 150);
                    }

                    // BUILDUP BENERAN: Naikin pitch 3 detik buat drop
                    if(btn.dataset.fx === 'buildup') {
                        let pitch = 1.0;
                        const originalTempo = document.getElementById('tempo').value;
                        const originalLP = document.getElementById('lowpass').value;
                        const buildupInterval = setInterval(() => {
                            pitch += 0.05;
                            player.playbackRate = pitch;
                            lowpass.frequency.value = 20000 - (pitch * 3000);
                            if(pitch >= 1.5) clearInterval(buildupInterval);
                        }, 100);
                        setTimeout(() => {
                            player.playbackRate = originalTempo;
                            lowpass.frequency.value = originalLP;
                        }, 3000);
                    }
                }
            };
        });

        // Update All Effects
        function update() {
            if (!ctx) return;
            const ids = ['pitch','tempo','reverb','echo','flanger','distortion','eq60','eq250','eq1k','eq4k','eq12k','lowpass','highpass'];
            ids.forEach(id => {
                const valEl = document.getElementById(id+'Val');
                if(valEl) valEl.textContent = document.getElementById(id).value;
            });

            player.playbackRate = document.getElementById('tempo').value;
            player.preservesPitch = false;

            delay.delayTime.value = document.getElementById('echo').value * 0.5;
            eq60.gain.value = document.getElementById('eq60').value;
            eq250.gain.value = document.getElementById('eq250').value;
            eq1k.gain.value = document.getElementById('eq1k').value;
            eq4k.gain.value = document.getElementById('eq4k').value;
            eq12k.gain.value = document.getElementById('eq12k').value;
            lowpass.frequency.value = document.getElementById('lowpass').value;
            highpass.frequency.value = document.getElementById('highpass').value;

            const dist = document.getElementById('distortion').value * 100;
            distortionNode.curve = makeDistortionCurve(dist);
        }

        function makeDistortionCurve(amount) {
            const k = amount, n = 44100, curve = new Float32Array(n);
            for (let i = 0; i < n; i++) {
                const x = i * 2 / n - 1;
                curve[i] = (3 + k) * x * 20 * Math.PI / 180 / (Math.PI + k * Math.abs(x));
            }
            return curve;
        }

        document.querySelectorAll('input[type=range]').forEach(s => s.oninput = update);

        // Visualizer + Beat Flash
        function visual() {
            const buf = new Uint8Array(analyser.frequencyBinCount);
            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(buf);
                ctx2d.fillStyle = '#000';
                ctx2d.fillRect(0, 0, canvas.width, canvas.height);

                let sum = 0;
                for (let i = 0; i < buf.length; i++) {
                    const h = buf[i] / 2;
                    sum += buf[i];
                    const g = ctx2d.createLinearGradient(0, 0, 0, canvas.height);
                    g.addColorStop(0, '#ff0080');
                    g.addColorStop(1, '#7928ca');
                    ctx2d.fillStyle = g;
                    ctx2d.fillRect(i * 3, canvas.height - h, 2, h);
                }

                if (isFlash && sum / buf.length > 100) {
                    document.body.style.background = '#ff0080';
                    setTimeout(() => document.body.style.background = '#0a0a0a', 50);
                }
            }
            draw();
        }

        // Record
        document.getElementById('recBtn').onclick = async function() {
            await initAudioContext();
            if (!mediaRec || mediaRec.state === 'inactive') {
                const dest = ctx.createMediaStreamDestination();
                gain.connect(dest);
                mediaRec = new MediaRecorder(dest.stream);
                chunks = [];
                mediaRec.ondataavailable = e => chunks.push(e.data);
                mediaRec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'DJ-PRO-MIX.webm';
                    a.click();
                };
                mediaRec.start();
                this.textContent = '⏹️STOP';
                this.classList.add('active');
            } else {
                mediaRec.stop();
                this.textContent = '🔴';
                this.classList.remove('active');
            }
        };
    </script>
</body>
</html>
