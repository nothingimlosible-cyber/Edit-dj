<body>
  <div class="header">
    <h1>🎧 DJ WEB PRO - FULL VERSION</h1>

      <div class="slider-group"><label>VOLUME: <span id="volAVal">0dB</span></label><input type="range" id="volA" min="-60" max="6" value="0"></div>

        <button class="btn btn-play" id="playB">▶ PLAY</button>
        <button class="btn" id="cueB">CUE</button>
        <button class="btn" id="syncB">SYNC</button>
        <button class="btn" id="loopB">LOOP</button>
        <button class="btn" id="presetJedagB">🔥 JEDAG</button>

      <div class="slider-group"><label>VOLUME: <span id="volBVal">0dB</span></label><input type="range" id="volB" min="-60" max="6" value="0"></div>

      </div>
    </div>
  </div>

<script>
let deckA,deckB,crossFade,masterEQ,masterReverb,masterDelay,masterFilter,audioReady=!1,bpmA=120,bpmB=120,loopA=!1,loopB=!1,recorder,recording=!1,chunks=[],mic,micOn=!1,cuePointA=0,cuePointB=0;

async function startAudio(){if(audioReady)return!0;try{await Tone.start(),audioReady=!0,document.getElementById("status").textContent="✅ AUDIO READY! Upload lagu terus Play",document.getElementById("status").className="status ready",masterEQ=new Tone.EQ3(0,0,0).toDestination(),masterFilter=new Tone.Filter(2e4,"lowpass").connect(masterEQ),masterReverb=new Tone.Reverb({decay:2,wet:0}).connect(masterFilter),masterDelay=new Tone.FeedbackDelay({delayTime:"8n",feedback:.5,wet:0}).connect(masterReverb),crossFade=new Tone.CrossFade(.5).connect(masterDelay),deckA=new Tone.Player().connect(crossFade.a),deckB=new Tone.Player().connect(crossFade.b);return!0}catch(e){return alert("Error init audio: "+e),!1}}

// FILE LOAD
document.getElementById("fileA").onchange=async e=>{if(!await startAudio()||!e.target.files[0])return;const t=e.target.files[0];document.getElementById("trackA").textContent=t.name,await deckA.load(URL.createObjectURL(t)),drawWaveform("waveA",deckA.buffer),bpmA=await detectBPM(deckA.buffer),document.getElementById("bpmA").textContent=bpmA.toFixed(1)+" BPM",document.getElementById("durationA").textContent=formatTime(deckA.buffer.duration)};
document.getElementById("fileB").onchange=async e=>{if(!await startAudio()||!e.target.files[0])return;const t=e.target.files[0];document.getElementById("trackB").textContent=t.name,await deckB.load(URL.createObjectURL(t)),drawWaveform("waveB",deckB.buffer),bpmB=await detectBPM(deckB.buffer),document.getElementById("bpmB").textContent=bpmB.toFixed(1)+" BPM",document.getElementById("durationB").textContent=formatTime(deckB.buffer.duration)};

// PLAY/STOP
document.getElementById("playA").onclick=async()=>{if(!await startAudio()||!deckA.loaded)return alert("Upload lagu dulu di Deck A");"started"===deckA.state?(deckA.stop(),document.getElementById("playA").textContent="▶ PLAY",document.getElementById("playA").classList.remove("stop")):(deckA.start(),document.getElementById("playA").textContent="■ STOP",document.getElementById("playA").classList.add("stop"))};
document.getElementById("playB").onclick=async()=>{if(!await startAudio()||!deckB.loaded)return alert("Upload lagu dulu di Deck B");"started"===deckB.state?(deckB.stop(),document.getElementById("playB").textContent="▶ PLAY",document.getElementById("playB").classList.remove("stop")):(deckB.start(),document.getElementById("playB").textContent="■ STOP",document.getElementById("playB").classList.add("stop"))};

// CUE BENERAN
function setupCue(btnId,deck,getCue,setCue){const btn=document.getElementById(btnId);btn.onmousedown=async()=>{if(!await startAudio()||!deck.loaded)return;deck.start(0,getCue()),btn.style.background="#22c55e"};btn.onmouseup=()=>{if(deck.state==="started")deck.stop();btn.style.background="#2a2a2a"};btn.oncontextmenu=e=>{e.preventDefault();setCue(deck.immediateState.currentTime||0);btn.textContent="CUE ✓";setTimeout(()=>btn.textContent="CUE",800)}}
setupCue("cueA",deckA,()=>cuePointA,e=>cuePointA=e);
setupCue("cueB",deckB,()=>cuePointB,e=>cuePointB=e);

// LOOP BENERAN
document.getElementById("loopA").onclick=()=>{if(!deckA.loaded)return alert("Upload lagu dulu");loopA=!loopA;const e=document.getElementById("loopA");loopA?(deckA.setLoopPoints(deckA.immediateState.currentTime||0,(deckA.immediateState.currentTime||0)+8),deckA.loop=!0,e.style.background="#f59e0b",e.textContent="LOOP ON"):(deckA.loop=!1,e.style.background="#2a2a2a",e.textContent="LOOP")};

// SYNC
document.getElementById("syncA").onclick=()=>{const e=bpmB/bpmA;deckA.playbackRate=e,document.getElementById("tempoA").value=e,document.getElementById("tempoAVal").textContent=e.toFixed(2)+"x"};
document.getElementById("syncB").onclick=()=>{const e=bpmA/bpmB;deckB.playbackRate=e,document.getElementById("tempoB").value=e,document.getElementById("tempoBVal").textContent=e.toFixed(2)+"x"};

// TEMPO + VOLUME
document.getElementById("tempoA").oninput=e=>{deckA.playbackRate=parseFloat(e.target.value),document.getElementById("tempoAVal").textContent=parseFloat(e.target.value).toFixed(2)+"x"};
document.getElementById("tempoB").oninput=e=>{deckB.playbackRate=parseFloat(e.target.value),document.getElementById("tempoBVal").textContent=parseFloat(e.target.value).toFixed(2)+"x"};
document.getElementById("volA").oninput=e=>{deckA.volume.value=parseFloat(e.target.value),document.getElementById("volAVal").textContent=e.target.value+"dB"};
document.getElementById("volB").oninput=e=>{deckB.volume.value=parseFloat(e.target.value),document.getElementById("volBVal").textContent=e.target.value+"dB"};
document.getElementById("crossfader").oninput=e=>crossFade.fade.value=parseFloat(e.target.value);

// FX
document.getElementById("bass").oninput=e=>masterEQ.low.value=parseFloat(e.target.value);
document.getElementById("mid").oninput=e=>masterEQ.mid.value=parseFloat(e.target.value);
document.getElementById("treble").oninput=e=>masterEQ.high.value=parseFloat(e.target.value);
document.getElementById("reverb").oninput=e=>{masterReverb.wet.value=parseFloat(e.target.value),document.getElementById("reverbVal").textContent=Math.round(e.target.value*100)+"%"};
document.getElementById("decay").oninput=e=>{masterReverb.decay=parseFloat(e.target.value),document.getElementById("decayVal").textContent=parseFloat(e.target.value).toFixed(1)+"s"};
document.getElementById("echo").oninput=e=>{masterDelay.wet.value=parseFloat(e.target.value),document.getElementById("echoVal").textContent=Math.round(e.target.value*100)+"%"};
document.getElementById("echoTime").oninput=e=>{masterDelay.delayTime.value=parseFloat(e.target.value),document.getElementById("echoTimeVal").textContent=parseFloat(e.target.value).toFixed(2)+"s"};
document.getElementById("filter").oninput=e=>{masterFilter.frequency.value=parseFloat(e.target.value);const t=parseFloat(e.target.value);document.getElementById("filterVal").textContent=t>=1e3?(t/1e3).toFixed(1)+"kHz":t+"Hz"};
document.getElementById("resonance").oninput=e=>{masterFilter.Q.value=parseFloat(e.target.value),document.getElementById("resVal").textContent=e.target.value};

// JOGWHEEL
[["jogA","tempoA",()=>deckA],["jogB","tempoB",()=>deckB]].forEach(([e,t,o])=>{const a=document.getElementById(e);let n=!1,r=0;a.onmousedown=e=>{n=!0,e.preventDefault()},document.onmouseup=()=>{n=!1},document.onmousemove=e=>{if(n&&o().loaded){r+=e.movementX,a.style.transform=`rotate(${r}deg)`;const a=o(),n=parseFloat(document.getElementById(t).value);a.playbackRate=n+1e-2*e.movementX,clearTimeout(a.scratchTimeout),a.scratchTimeout=setTimeout(()=>a.playbackRate=n,100)}}});

// WAVEFORM SEEK
document.getElementById("waveformA").onclick=e=>{if(!deckA.loaded)return;const t=e.offsetX/e.target.offsetWidth;deckA.seek(deckA.buffer.duration*t)};
document.getElementById("waveformB").onclick=e=>{if(!deckB.loaded)return;const t=e.offsetX/e.target.offsetWidth;deckB.seek(deckB.buffer.duration*t)};

// PRESET
function applyPreset(deck,vals){vals.tempo&&(document.getElementById("tempo"+deck).value=vals.tempo,document.getElementById("tempo"+deck).dispatchEvent(new Event("input")));vals.bass&&(document.getElementById("bass").value=vals.bass,document.getElementById("bass").dispatchEvent(new Event("input")));vals.reverb&&(document.getElementById("reverb").value=vals.reverb,document.getElementById("reverb").dispatchEvent(new Event("input")));vals.decay&&(document.getElementById("decay").value=vals.decay,document.getElementById("decay").dispatchEvent(new Event("input")));vals.treble&&(document.getElementById("treble").value=vals.treble,document.getElementById("treble").dispatchEvent(new Event("input")));vals.filter&&(document.getElementById("filter").value=vals.filter,document.getElementById("filter").dispatchEvent(new Event("input")));vals.res&&(document.getElementById("resonance").value=vals.res,document.getElementById("resonance").dispatchEvent(new Event("input")));vals.echo&&(document.getElementById("echo").value=vals.echo,document.getElementById("echo").dispatchEvent(new Event("input")))}
document.getElementById("presetJedagA").onclick=()=>applyPreset("A",{tempo:0.85,bass:18,reverb:0.15});
document.getElementById("presetJedagB").onclick=()=>applyPreset("B",{tempo:0.85,bass:18,reverb:0.15});
document.getElementById("presetSadA").onclick=()=>applyPreset("A",{tempo:0.80,reverb:0.40,decay:5,treble:-5,filter:8000});
document.getElementById("presetLofiB").onclick=()=>applyPreset("B",{tempo:0.85,filter:4000,res:8,echo:0.15,bass:8,treble:-10});

// MIC
document.getElementById("micBtn").onclick=async()=>{if(!audioReady)await startAudio();if(!micOn){try{mic=new Tone.UserMedia;await mic.open(),mic.connect(masterEQ),micOn=!0;const e=document.getElementById("micBtn");e.textContent="🎤 MIC ON",e.style.background="#22c55e"}catch(e){alert("Gagal nyalain mic: "+e)}}else{mic.close(),micOn=!1;const e=document.getElementById("micBtn");e.textContent="🎤 MIC OFF",e.style.background="#3b82f6"}};

// REC
document.getElementById("recBtn").onclick=async()=>{if(!audioReady)return alert("Klik Play dulu");if(!recording){const e=Tone.context.createMediaStreamDestination();masterEQ.connect(e),recorder=new MediaRecorder(e.stream),recorder.ondataavailable=e=>chunks.push(e.data),recorder.onstop=()=>{const e=new Blob(chunks,{type:"audio/webm"}),t=URL.createObjectURL(e),o=document.createElement("a");o.href=t,o.download="DJ_Mix_"+Date.now()+".webm",o.click(),chunks=[]},recorder.start(),recor
